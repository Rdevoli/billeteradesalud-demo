<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billetera de Salud — Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #085041;
    --green-mid: #0F6E56;
    --amber: #FAEEDA;
    --amber-dark: #633806;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --red-light: #FCEBEB;
    --red-dark: #791F1F;
    --gray-light: #F1EFE8;
    --gray-mid: #888780;
    --text: #1a1a18;
    --text-muted: #5F5E5A;
    --text-hint: #888780;
    --border: rgba(0,0,0,0.1);
    --surface: #ffffff;
    --bg: #f5f4f0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: 14px;
    color: var(--text-muted);
  }

  .demo-wrap {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    max-width: 900px;
    width: 100%;
  }

  .phone-wrap {
    flex-shrink: 0;
  }

  .phone {
    width: 300px;
    background: var(--surface);
    border-radius: 36px;
    border: 8px solid #1a1a18;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    position: relative;
  }

  .phone-notch {
    background: #1a1a18;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .notch-pill {
    width: 80px;
    height: 10px;
    background: #2a2a28;
    border-radius: 5px;
  }

  .statusbar {
    background: var(--green);
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .statusbar span {
    color: rgba(255,255,255,0.9);
    font-size: 10px;
    font-weight: 500;
  }

  .navbar {
    background: var(--green);
    padding: 8px 16px 14px;
  }

  .navbar h2 {
    color: white;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .navbar p {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    margin-top: 2px;
  }

  .screen {
    padding: 14px;
    min-height: 420px;
    background: var(--bg);
  }

  .bottomnav {
    display: flex;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    padding-bottom: 8px;
  }

  .bnav-item {
    flex: 1;
    padding: 8px 4px 4px;
    text-align: center;
    cursor: pointer;
    font-size: 9px;
    color: var(--text-hint);
  }

  .bnav-item.active { color: var(--green); }

  .bnav-icon {
    font-size: 17px;
    display: block;
    margin-bottom: 2px;
  }

  .sidebar {
    flex: 1;
    min-width: 240px;
  }

  .step-nav {
    margin-bottom: 20px;
  }

  .step-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.15s;
    margin-bottom: 4px;
  }

  .step-btn:hover { background: rgba(0,0,0,0.04); }
  .step-btn.active { background: var(--green-light); }

  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--gray-light);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .step-btn.active .step-num {
    background: var(--green);
    color: white;
  }

  .step-btn.done .step-num {
    background: var(--green-light);
    color: var(--green-dark);
  }

  .step-name {
    font-size: 13px;
    color: var(--text);
    font-weight: 400;
  }

  .step-btn.active .step-name { color: var(--green-dark); font-weight: 500; }

  .nav-arrows {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .btn-arrow {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .btn-arrow:hover { background: var(--gray-light); }

  .btn-arrow.primary {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }

  .btn-arrow.primary:hover { background: var(--green-mid); }
  .btn-arrow:disabled { opacity: 0.4; cursor: default; }

  .card {
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 0.5px solid var(--border);
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .badge-green { background: var(--green-light); color: var(--green-dark); }
  .badge-gray { background: var(--gray-light); color: var(--gray-mid); }
  .badge-amber { background: var(--amber); color: var(--amber-dark); }
  .badge-red { background: var(--red-light); color: var(--red-dark); }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .av-teal { background: var(--green-light); color: var(--green-dark); }
  .av-amber { background: var(--amber); color: var(--amber-dark); }
  .av-blue { background: var(--blue-light); color: var(--blue-dark); }

  .field {
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 7px;
    width: 100%;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
  }

  .label {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 3px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-hint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .row { display: flex; align-items: center; gap: 8px; }

  .upload-zone {
    border: 1.5px dashed rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    margin-bottom: 8px;
    background: var(--surface);
  }

  .green-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.01em;
  }

  .admin-nav {
    background: #1D3A5F;
    padding: 10px 16px 14px;
  }

  .admin-nav p { color: rgba(255,255,255,0.6); font-size: 10px; margin-bottom: 2px; }
  .admin-nav h2 { color: white; font-size: 16px; font-weight: 600; }

  .admin-btn-g {
    background: var(--green-light);
    color: var(--green-dark);
    border: 0.5px solid #5DCAA5;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .admin-btn-r {
    background: var(--red-light);
    color: var(--red-dark);
    border: 0.5px solid #F09595;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .progress-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .progress-seg {
    height: 3px;
    flex: 1;
    border-radius: 2px;
    background: rgba(0,0,0,0.1);
  }

  .progress-seg.done { background: var(--green); }

  .pill-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .info-box {
    padding: 8px 10px;
    border-radius: 8px;
    margin-top: 6px;
  }

  .info-box p:first-child {
    font-size: 10px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .info-box p:last-child { font-size: 10px; }

  @media (max-width: 680px) {
    .demo-wrap { flex-direction: column; align-items: center; }
    .sidebar { width: 300px; }
    .step-nav { display: flex; flex-wrap: wrap; gap: 4px; }
    .step-btn { width: auto; flex: 1; min-width: 120px; }
  }
</style>
</head>

let current = 0;

function render() {
  const s = steps[current];
  document.getElementById('navbar').innerHTML = s.navbar();
  document.getElementById('screen').innerHTML = s.screen();
  document.getElementById('bottomnav').style.display = s.showNav ? 'flex' : 'none';

  const nav = document.getElementById('step-nav');
  nav.innerHTML = steps.map((st, i) => `
    <button class="step-btn ${i === current ? 'active' : i < current ? 'done' : ''}" onclick="goTo(${i})">
      <div class="step-num">${i < current ? '✓' : i + 1}</div>
      <span class="step-name">${st.name}</span>
    </button>
  `).join('');

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === steps.length - 1;
  document.getElementById('btn-next').textContent = current === steps.length - 1 ? '— Fin —' : 'Siguiente →';
}

function nextStep() { if (current < steps.length - 1) { current++; render(); } }
function prevStep() { if (current > 0) { current--; render(); } }
function goTo(i) { current = i; render(); }

render();
</script>
